  <circle cx="25" cy="35" r="5" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="25" cy="35" r="2" fill="#2c3e50"/>
  
  <!-- 右轮（对称） -->
  <circle cx="75" cy="35" r="10" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="75" cy="35" r="5" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="75" cy="35" r="2" fill="#2c3e50"/>
  
  <!-- 身体（居中） -->
  <rect x="38" y="55" width="24" height="14" rx="3" fill="none" stroke="#27ae60" stroke-width="3"/>
  
  <!-- 身体装饰（居中） -->
  <line x1="40" y1="62" x2="60" y2="62" stroke="#27ae60" stroke-width="2"/>
  <circle cx="50" cy="62" r="4" fill="none" stroke="#27ae60" stroke-width="2"/>
