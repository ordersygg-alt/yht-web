<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 双眼（对称） -->
  <circle cx="25" cy="72" r="16" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <circle cx="75" cy="72" r="16" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <circle cx="25" cy="72" r="7" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="75" cy="72" r="7" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="25" cy="72" r="3" fill="#2c3e50"/>
  <circle cx="75" cy="72" r="3" fill="#2c3e50"/>
  
  <!-- 鼻梁（居中） -->
  <line x1="25" y1="72" x2="75" y2="72" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- 颈部（居中） -->
  <line x1="50" y1="72" x2="50" y2="45" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- 双臂（对称） -->
  <line x1="50" y1="45" x2="25" y2="35" stroke="#2c3e50" stroke-width="3"/>
  <line x1="50" y1="45" x2="75" y2="35" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- 左轮（对称） -->
